name: Publish

on:
  pull_request:
    types:
      - opened
      - closed
      - edited
      - labeled
      - unlabeled
      - synchronize
    branches:
      - main  
permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME:  ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for pushing the release and tag to the repository
      pull-requests: write # Required for adding the labels to the PR
      attestations: write # Required for pushing the SBOM and provenance to GitHub Container Registry
      id-token: write # Required for pushing the SBOM and provenance to GitHub Container Registry
      issues: write # Required for adding labels to the repository
      packages: write # Required for pushing the Docker image to GitHub Packages

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go 1.25.8
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.1

      - name: Calculate version
        id: semVersie
        uses: RonaldPhilipsen/semVersie@v2.2.0
        with:
          add-pr-label: true

      - name: Install dependencies
        run: go get .

      - name: Build
        env:
          VERSION: ${{ steps.semVersie.outputs.tag }}
          GIT_SHA: ${{ github.sha }}
        run: |
          go build \
            -ldflags="-s -w -extldflags '-static' -X 'main.BuildVersion=$VERSION' -X 'main.BuildCommitSha=$GIT_SHA' -X 'main.BuildDate=$(date -u +'%Y-%m-%dT%H:%M:%SZ')'" \
            -o dist/gaggiuino-exporter

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@5c42dd293b89d96bae168b5b3694e4e72a5b1117
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@4378dc6be7f72231dfe78ac7e0364a44f1c9f54b
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@b66d8774c665b789105b440514f0c97e6f19b06f
        with:
          context: .
          push: ${{ (steps.semVersie.outputs.release == 'true' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.merged == 'true') || steps.semVersie.outputs.prerelease == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest@v4
        if: ${{ (steps.semVersie.outputs.release == 'true' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.merged == 'true') || steps.semVersie.outputs.prerelease == 'true' }}
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # If the PR is merged to main and semVersie indicates a real release, create a release and tag it.
      - name: Tag Release
        if: ${{ steps.semVersie.outputs.release == 'true' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.merged == true }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag ${{ steps.semVersie.outputs.tag }}
          git push origin ${{ steps.semVersie.outputs.tag }}
      - name: Create Release
        if: ${{ steps.semVersie.outputs.release == 'true' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.merged == true }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ steps.semVersie.outputs.tag }} \
            --title '${{ steps.semVersie.outputs.tag }}' \
            --notes '${{ steps.semVersie.outputs.release-notes }}' \
            $([[ '${{ steps.semVersie.outputs.prerelease }}' == 'true' ]] && echo '--prerelease' || echo '') \
            dist/gaggiuino-exporter
